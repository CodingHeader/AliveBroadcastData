{% extends "admin/base.html" %}
{% block admin_content %}
<div x-data="adAccountsApp()" x-init="loadData()" class="space-y-4">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold">直播账户管理</h2>
        <button @click="openCreate()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新增账户</button>
    </div>
    <div class="bg-white rounded-lg shadow-sm overflow-x-auto">
        <table class="data-table">
            <thead><tr><th>ID</th><th>账户名称</th><th>抖音来客商家ID</th><th>备注</th><th>操作</th></tr></thead>
            <tbody>
                <template x-for="a in accounts" :key="a.id">
                    <tr>
                        <td x-text="a.id"></td>
                        <td>
                            <span x-show="!a._editing" x-text="a.account_name"></span>
                            <input x-show="a._editing" x-model="a.account_name" class="form-input w-40 py-1">
                        </td>
                        <td>
                            <span x-show="!a._editing" x-text="a.merchant_id || '-'" class="font-mono text-sm"></span>
                            <input x-show="a._editing" x-model="a.merchant_id" class="form-input w-40 py-1 font-mono" placeholder="抖音来客商家ID">
                        </td>
                        <td>
                            <span x-show="!a._editing" x-text="a.notes || '-'"></span>
                            <input x-show="a._editing" x-model="a.notes" class="form-input w-40 py-1">
                        </td>
                        <td class="space-x-2">
                            <template x-if="!a._editing">
                                <button @click="a._editing=true" class="text-blue-500 hover:text-blue-700 text-sm">编辑</button>
                            </template>
                            <template x-if="a._editing">
                                <button @click="saveAccount(a)" class="text-green-500 hover:text-green-700 text-sm">保存</button>
                            </template>
                            <button @click="deleteAccount(a.id)" class="text-red-500 hover:text-red-700 text-sm">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div x-show="accounts.length===0 && _loaded" class="text-center py-8 text-gray-400">暂无直播账户，点击右上角新增</div>
    </div>

    <!-- 新增弹窗 -->
    <div x-show="showModal" x-transition.opacity class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="showModal=false" x-cloak>
        <div class="bg-white p-6 rounded-lg shadow-xl w-[480px] space-y-4">
            <h3 class="font-bold text-lg">新增直播账户</h3>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">账户名称</label>
                <input x-model="form.account_name" class="form-input w-full" placeholder="如：主账号">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">抖音来客商家ID</label>
                <input x-model="form.merchant_id" class="form-input w-full font-mono" placeholder="商家ID">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                <input x-model="form.notes" class="form-input w-full" placeholder="备注信息">
            </div>
            <div class="flex gap-2 pt-2">
                <button @click="addAccount()" class="btn-primary">保存</button>
                <button @click="showModal=false" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300 text-sm">取消</button>
            </div>
        </div>
    </div>
</div>
<script>
function adAccountsApp() { return { accounts: [], showModal: false, _loaded: false,
    form: { account_name: '', merchant_id: '', notes: '' },
    openCreate() {
        this.form.account_name = '';
        this.form.merchant_id = '';
        this.form.notes = '';
        this.showModal = true;
    },
    async loadData() {
        try {
            const r = await adminFetch('/admin/api/ad-accounts'); const j = await r.json();
            this.accounts = (j.data||[]).map(a => ({...a, _editing: false}));
            this._loaded = true;
        } catch(e) {
            console.error('加载直播账户失败:', e);
        }
    },
    async addAccount() {
        if(!this.form.account_name) { alert('请填写账户名称'); return; }
        const r = await adminFetch('/admin/api/ad-accounts', {method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify(this.form)});
        const j = await r.json();
        if(j.code===0) { this.showModal=false; this.loadData(); }
        else { alert(j.message||'新增失败'); }
    },
    async saveAccount(a) {
        const r = await adminFetch(`/admin/api/ad-accounts/${a.id}`, {method:'PUT',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({account_name:a.account_name,merchant_id:a.merchant_id,notes:a.notes})});
        const j = await r.json();
        if(j.code===0) { a._editing=false; } else { alert(j.message||'保存失败'); }
    },
    async deleteAccount(id) {
        if(!confirm('确认删除？')) return;
        const r = await adminFetch(`/admin/api/ad-accounts/${id}`, {method:'DELETE'});
        const j = await r.json();
        if(j.code===0) this.loadData(); else alert(j.message||'删除失败');
    }
}; }
</script>
{% endblock %}
