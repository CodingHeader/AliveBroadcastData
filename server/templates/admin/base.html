{% extends "base.html" %}
{% block nav_container %}w-full px-0{% endblock %}
{% block main_container_class %}w-full{% endblock %}
{% block content %}
<script>
if (!localStorage.getItem('admin_token')) { window.location.href = '/admin/login'; }
// 确保 adminFetch 在全局作用域可用
if (typeof adminFetch === 'undefined') {
    window.adminFetch = async function(url, options = {}) {
        const token = localStorage.getItem('admin_token');
        const headers = options.headers || {};
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const resp = await fetch(url, {...options, headers});
        if (resp.status === 401) { localStorage.removeItem('admin_token'); location.href = '/admin/login'; }
        return resp;
    };
}
// 侧边栏应用（SPA无刷新导航 + localStorage持久化折叠状态）
function sidebarApp() {
    return {
        expand: JSON.parse(localStorage.getItem('sidebar_expand') || '{"anchor":false,"schedule":false,"plan":false,"extend":false,"config":false}'),
        // 使用响应的 _path 追踪当前路径
        _path: location.pathname,
        _knownPaths: {anchor:['anchors','anchor-income','anchor-salary'],schedule:['schedules','schedule-calendar','schedule-log'],plan:['ad-accounts','ad-plans','leads'],extend:['deals','recruit-teams'],config:['/admin/ai','/admin/email','/admin/settings','clue-configs','dashboard-tabs','poll-logs']},
        init() {
            this._autoExpand();
            this._saveExpand();
            window.addEventListener('popstate', (e) => { this.loadContent(location.pathname, true); });
        },
        _autoExpand() {
            const a = this._path;
            Object.keys(this._knownPaths).forEach(k => {
                this._knownPaths[k].forEach(p => { if (a.includes(p)) this.expand[k] = true; });
            });
        },
        _saveExpand() {
            localStorage.setItem('sidebar_expand', JSON.stringify(this.expand));
        },
        toggleExpand(key) {
            this.expand[key] = !this.expand[key];
            this._saveExpand();
        },
        isActive(path) {
            const a = this._path;
            // 精确匹配：路径相同 or 路径+/xxx 子路径 or 路径?xxx 查询参数
            return a === path || a.startsWith(path + '/') || a.startsWith(path + '?');
        },
        navigateTo(url) {
            // 统一导航入口：更新 _path → Alpine 响应式触发 isActive 重算
            this._path = url;
            this._autoExpand();
            this._saveExpand();
            this.loadContent(url);
        },
        async loadContent(url, isPopState = false) {
            if (!isPopState && url === location.pathname) return;
            try {
                const resp = await adminFetch(url);
                const html = await resp.text();
                const mainMatch = html.match(/<main[^>]*>([\s\S]*?)<\/main>/i);
                if (mainMatch) {
                    document.querySelector('main').innerHTML = mainMatch[1];
                    Array.from(document.querySelectorAll('main script')).forEach(oldScript => {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.textContent = oldScript.textContent;
                        oldScript.replaceWith(newScript);
                    });
                    if (typeof Alpine !== 'undefined') {
                        Alpine.initTree(document.querySelector('main'));
                    }
                }
                if (!isPopState) {
                    history.pushState({}, '', url);
                }
            } catch(e) {
                console.error('导航失败:', e);
                location.href = url;
            }
        }
    };
}
</script>
<style>[x-cloak] { display: none !important; }</style>
<div class="flex min-h-[calc(100vh-4rem)]" x-data="sidebarApp()" x-init="init()">
    <aside class="w-60 bg-gradient-to-b from-gray-900 to-gray-800 text-white p-4 flex flex-col sticky top-0 h-screen overflow-y-auto shrink-0">
        <div class="text-lg font-bold mb-5 pl-3 flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            控制台
        </div>
        <nav class="space-y-1 flex-1">

            <!-- ===== 主播管理 ===== -->
            <div class="mb-2">
                <button @click="toggleExpand('anchor')" class="w-full flex items-center gap-2 text-sm text-gray-400 hover:text-white px-3 py-2 rounded-lg transition-colors">
                    <svg class="w-4 h-4 transition-transform" :class="expand.anchor ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0M12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <span class="font-medium text-white">主播管理</span>
                </button>
                <div x-show="expand.anchor" class="ml-2 mt-1 space-y-0.5">
                    <a href="/admin/anchors" @click.prevent="navigateTo('/admin/anchors')" :class="isActive('/admin/anchors') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">主播配置</a>
                    <a href="/admin/anchor-income" @click.prevent="navigateTo('/admin/anchor-income')" :class="isActive('/admin/anchor-income') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">直播详情</a>
                    <a href="/admin/anchor-salary" @click.prevent="navigateTo('/admin/anchor-salary')" :class="isActive('/admin/anchor-salary') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">薪酬计算</a>
                </div>
            </div>

            <!-- ===== 排班管理 ===== -->
            <div class="mb-2">
                <button @click="toggleExpand('schedule')" class="w-full flex items-center gap-2 text-sm text-gray-400 hover:text-white px-3 py-2 rounded-lg transition-colors">
                    <svg class="w-4 h-4 transition-transform" :class="expand.schedule ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span class="font-medium text-white">排班管理</span>
                </button>
                <div x-show="expand.schedule" class="ml-2 mt-1 space-y-0.5">
                    <a href="/admin/schedules" @click.prevent="navigateTo('/admin/schedules')" :class="isActive('/admin/schedules') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">排班方案</a>
                    <a href="/admin/schedule-calendar" @click.prevent="navigateTo('/admin/schedule-calendar')" :class="isActive('/admin/schedule-calendar') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">排班日历</a>
                    <a href="/admin/schedule-log" @click.prevent="navigateTo('/admin/schedule-log')" :class="isActive('/admin/schedule-log') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">排班日志</a>
                </div>
            </div>

            <!-- ===== 直播计划 ===== -->
            <div class="mb-2">
                <button @click="toggleExpand('plan')" class="w-full flex items-center gap-2 text-sm text-gray-400 hover:text-white px-3 py-2 rounded-lg transition-colors">
                    <svg class="w-4 h-4 transition-transform" :class="expand.plan ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    <span class="font-medium text-white">直播计划</span>
                </button>
                <div x-show="expand.plan" class="ml-2 mt-1 space-y-0.5">
                    <a href="/admin/ad-accounts" @click.prevent="navigateTo('/admin/ad-accounts')" :class="isActive('/admin/ad-accounts') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">直播账户</a>
                    <a href="/admin/ad-plans" @click.prevent="navigateTo('/admin/ad-plans')" :class="isActive('/admin/ad-plans') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">投流计划</a>
                    <a href="/admin/leads" @click.prevent="navigateTo('/admin/leads')" :class="isActive('/admin/leads') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">线索管理</a>
                </div>
            </div>

            <!-- ===== 拓展配置 ===== -->
            <div class="mb-2">
                <button @click="toggleExpand('extend')" class="w-full flex items-center gap-2 text-sm text-gray-400 hover:text-white px-3 py-2 rounded-lg transition-colors">
                    <svg class="w-4 h-4 transition-transform" :class="expand.extend ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                    <span class="font-medium text-white">拓展配置</span>
                </button>
                <div x-show="expand.extend" class="ml-2 mt-1 space-y-0.5">
                    <a href="/admin/deals" @click.prevent="navigateTo('/admin/deals')" :class="isActive('/admin/deals') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">成单管理</a>
                    <a href="/admin/recruit-teams" @click.prevent="navigateTo('/admin/recruit-teams')" :class="isActive('/admin/recruit-teams') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">招生团队</a>
                </div>
            </div>

            <!-- ===== 系统配置 ===== -->
            <div class="mb-2">
                <button @click="toggleExpand('config')" class="w-full flex items-center gap-2 text-sm text-gray-400 hover:text-white px-3 py-2 rounded-lg transition-colors">
                    <svg class="w-4 h-4 transition-transform" :class="expand.config ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="font-medium text-white">系统配置</span>
                </button>
                <div x-show="expand.config" class="ml-2 mt-1 space-y-0.5">
                    <a href="/admin/ai" @click.prevent="navigateTo('/admin/ai')" :class="isActive('/admin/ai') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">AI配置</a>
                    <a href="/admin/email" @click.prevent="navigateTo('/admin/email')" :class="isActive('/admin/email') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">邮箱配置</a>
                    <a href="/admin/settings" @click.prevent="navigateTo('/admin/settings')" :class="isActive('/admin/settings') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">系统设置</a>
                    <a href="/admin/clue-configs" @click.prevent="navigateTo('/admin/clue-configs')" :class="isActive('/admin/clue-configs') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">API线索账号</a>
                    <a href="/admin/poll-logs" @click.prevent="navigateTo('/admin/poll-logs')" :class="isActive('/admin/poll-logs') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">线索推送</a>
                    <a href="/admin/dashboard-tabs" @click.prevent="navigateTo('/admin/dashboard-tabs')" :class="isActive('/admin/dashboard-tabs') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2 pl-9 text-sm">报表Tab配置</a>
                </div>
            </div>
        </nav>
        <div class="pt-4 border-t border-gray-700">
            <button onclick="localStorage.removeItem('admin_token');location.href='/admin/login'" class="sidebar-link flex items-center gap-2 text-gray-400 hover:text-red-400 w-full">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                退出登录
            </button>
        </div>
    </aside>
    <main class="flex-1 p-6 bg-gray-50 overflow-auto">{% block admin_content %}{% endblock %}</main>
</div>
{% endblock %}
