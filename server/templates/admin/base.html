{% extends "base.html" %}
{% block content %}
<div class="flex min-h-[calc(100vh-4rem)]" x-data="{active: location.pathname}">
    <aside class="w-60 bg-gradient-to-b from-gray-900 to-gray-800 text-white p-4 flex flex-col sticky top-0 h-screen overflow-y-auto shrink-0">
        <div class="text-lg font-bold mb-5 px-2 flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            直播后台
        </div>
        <div class="text-xs text-gray-500 uppercase tracking-wider px-2 mb-2">数据管理</div>
        <nav class="space-y-1">
            <a href="/admin/deals" :class="active.includes('/admin/deals') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                成单管理
            </a>
            <a href="/admin/anchors" :class="active.includes('/admin/anchors') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0M12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                主播配置
            </a>
            <a href="/admin/leads" :class="active.includes('/admin/leads') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                线索管理
            </a>
        </nav>
        <div class="border-t border-gray-700 my-3"></div>
        <div class="text-xs text-gray-500 uppercase tracking-wider px-2 mb-2">系统配置</div>
        <nav class="space-y-1">
            <a href="/admin/ai" :class="active.includes('/admin/ai') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                AI配置
            </a>
            <a href="/admin/email" :class="active.includes('/admin/email') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                邮箱配置
            </a>
            <a href="/admin/settings" :class="active.includes('/admin/settings') ? 'sidebar-link active' : 'sidebar-link'" class="sidebar-link flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                系统设置
            </a>
        </nav>
        <div class="mt-auto pt-4 border-t border-gray-700">
            <button onclick="localStorage.removeItem('admin_token');location.href='/admin/login'" class="sidebar-link flex items-center gap-2 text-gray-400 hover:text-red-400 w-full">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                退出登录
            </button>
        </div>
    </aside>
    <main class="flex-1 p-6 bg-gray-50 overflow-auto">{% block admin_content %}{% endblock %}</main>
</div>
{% endblock %}
