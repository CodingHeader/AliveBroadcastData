{% extends "admin/base.html" %}
{% block admin_content %}
<div x-data="dashboardTabs()">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">报表Tab配置</h2>
        <button @click="openCreate()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">+ 新增Tab</button>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">排序</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">名称</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">类型</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">图表</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">指标数</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">操作</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="tab in tabs" :key="tab.id">
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-3" x-text="tab.priority"></td>
                        <td class="px-4 py-3 font-medium" x-text="tab.name"></td>
                        <td class="px-4 py-3">
                            <span x-text="tab.is_system ? '系统(不可删)' : '自定义'" :class="tab.is_system ? 'text-blue-600' : 'text-green-600'"></span>
                        </td>
                        <td class="px-4 py-3" x-text="tab.chart_type === 'line' ? '折线图' : tab.chart_type"></td>
                        <td class="px-4 py-3" x-text="(tab.metrics_config || []).length"></td>
                        <td class="px-4 py-3 space-x-2">
                            <button @click="openEdit(tab)" class="text-blue-600 hover:underline">编辑</button>
                            <button x-show="!tab.is_system" @click="deleteTab(tab)" class="text-red-600 hover:underline">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- 编辑弹窗 -->
    <div x-show="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak @click.self="showModal=false">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6">
            <h3 class="text-lg font-bold mb-4" x-text="editingId ? '编辑Tab' : '新增Tab'"></h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tab名称</label>
                    <input x-model="form.name" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="如：流量分析">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">排序优先级（数字越小越靠前）</label>
                    <input x-model.number="form.priority" type="number" class="w-full border rounded-lg px-3 py-2 text-sm" min="0">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">图表类型</label>
                    <select x-model="form.chart_type" class="w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="line">折线图</option>
                        <option value="bar">柱状图</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">指标配置（JSON数组）</label>
                    <p class="text-xs text-gray-500 mb-1">格式: [{"key":"字段名","label":"显示名","type":"field|computed","formula":"a/b"}]</p>
                    <textarea x-model="form.metrics_config_str" class="w-full border rounded-lg px-3 py-2 text-sm font-mono" rows="6" placeholder='[{"key":"exposure_count","label":"曝光人数","type":"field"}]'></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">系统提示词（可选，不填则用默认）</label>
                    <textarea x-model="form.system_prompt" class="w-full border rounded-lg px-3 py-2 text-sm" rows="3"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户提示词（可选，不填则用默认）</label>
                    <textarea x-model="form.user_prompt" class="w-full border rounded-lg px-3 py-2 text-sm" rows="3"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button @click="showModal=false" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">取消</button>
                <button @click="saveTab()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
function dashboardTabs() {
    return {
        tabs: [],
        showModal: false,
        editingId: null,
        form: { name: '', priority: 1, chart_type: 'line', metrics_config_str: '[]', system_prompt: '', user_prompt: '' },

        async init() { await this.load(); },

        async load() {
            const res = await fetch('/admin/api/dashboard-tabs', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('admin_token') } });
            const data = await res.json();
            this.tabs = data.data || [];
        },

        openCreate() {
            this.editingId = null;
            this.form = { name: '', priority: 1, chart_type: 'line', metrics_config_str: '[]', system_prompt: '', user_prompt: '' };
            this.showModal = true;
        },

        openEdit(tab) {
            this.editingId = tab.id;
            this.form = {
                name: tab.name, priority: tab.priority, chart_type: tab.chart_type,
                metrics_config_str: JSON.stringify(tab.metrics_config || [], null, 2),
                system_prompt: tab.system_prompt || '', user_prompt: tab.user_prompt || ''
            };
            this.showModal = true;
        },

        async saveTab() {
            let metrics;
            try { metrics = JSON.parse(this.form.metrics_config_str); } catch { alert('指标配置JSON格式错误'); return; }
            const payload = { name: this.form.name, priority: this.form.priority, chart_type: this.form.chart_type,
                metrics_config: metrics, system_prompt: this.form.system_prompt || null, user_prompt: this.form.user_prompt || null };
            const url = this.editingId ? `/admin/api/dashboard-tabs/${this.editingId}` : '/admin/api/dashboard-tabs';
            const method = this.editingId ? 'PUT' : 'POST';
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('admin_token') }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.code === 0) { this.showModal = false; await this.load(); } else { alert(data.message || '保存失败'); }
        },

        async deleteTab(tab) {
            if (!confirm(`确定删除Tab「${tab.name}」？`)) return;
            const res = await fetch(`/admin/api/dashboard-tabs/${tab.id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('admin_token') } });
            const data = await res.json();
            if (data.code === 0) await this.load(); else alert(data.message || '删除失败');
        }
    }
}
</script>
{% endblock %}
