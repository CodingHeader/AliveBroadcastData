{% extends "admin/base.html" %}
{% block admin_content %}
<div x-data="settingsApp()" x-init="loadData()" class="space-y-4">
    <h2 class="text-xl font-bold">系统设置</h2>
    <div class="bg-white rounded-lg shadow-sm p-4 space-y-4">
        <h3 class="font-bold">修改密码</h3>
        <div><label class="block text-sm font-medium mb-1">原密码</label><input x-model="oldPwd" type="password" class="form-input"></div>
        <div><label class="block text-sm font-medium mb-1">新密码</label><input x-model="newPwd" type="password" class="form-input"></div>
        <button @click="changePwd()" class="btn-primary">修改密码</button>
        <p x-show="pwdMsg" x-text="pwdMsg" class="text-sm"></p>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-4 space-y-4">
        <h3 class="font-bold">系统信息</h3>
        <div class="grid grid-cols-2 gap-4 text-sm">
            <div>数据库: <span class="font-mono">data.db</span></div>
            <div>场次总数: <span x-text="stats.sessions||0"></span></div>
            <div>线索总数: <span x-text="stats.leads||0"></span></div>
            <div>最近同步: <span x-text="stats.last_sync||'-'"></span></div>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-4 space-y-4">
        <h3 class="font-bold">数据库备份与恢复</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button @click="downloadBackup()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm">下载完整备份(.db)</button>
            <button @click="exportJSON()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 text-sm">导出JSON数据</button>
            <div>
                <label class="px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600 text-sm cursor-pointer inline-block">
                    上传恢复数据库
                    <input type="file" accept=".db" @change="uploadRestore($event)" class="hidden">
                </label>
            </div>
        </div>
        <div x-show="dbMsg" class="text-sm" :class="dbMsgType==='error'?'text-red-500':'text-green-500'" x-text="dbMsg"></div>
        <!-- 自动备份列表 -->
        <div x-show="backups.length > 0" class="mt-4">
            <h4 class="font-medium text-sm mb-2">自动备份记录</h4>
            <table class="data-table text-sm">
                <thead><tr><th>文件名</th><th>大小</th><th>时间</th><th>操作</th></tr></thead>
                <tbody>
                    <template x-for="b in backups" :key="b.name">
                        <tr>
                            <td x-text="b.name"></td>
                            <td x-text="b.size_kb + ' KB'"></td>
                            <td x-text="b.modified"></td>
                            <td><a @click.prevent="downloadBackupFile(b.name)" href="#" class="text-blue-500 hover:text-blue-700 text-xs cursor-pointer">下载</a></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
function settingsApp() { return { oldPwd: '', newPwd: '', pwdMsg: '', stats: {}, backups: [], dbMsg: '', dbMsgType: 'success',
    async loadData() {
        const r = await adminFetch('/admin/api/settings'); const j = await r.json(); const d = j.data || {};
        this.stats = {sessions: d.session_count||0, leads: d.lead_count||0, last_sync: d.last_sync||'-'};
        this.loadBackups();
    },
    async loadBackups() {
        try { const r = await adminFetch('/admin/api/db/backups'); const j = await r.json(); this.backups = j.data || []; } catch(e) {}
    },
    async downloadBackupFile(filename) {
        try {
            const r = await fetch('/admin/api/db/backups/' + filename, {headers:{'Authorization':'Bearer '+localStorage.getItem('admin_token')}});
            if(!r.ok) { this.dbMsg='下载失败: '+r.status; this.dbMsgType='error'; return; }
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
            URL.revokeObjectURL(url);
        } catch(e) { this.dbMsg='下载失败: '+e.message; this.dbMsgType='error'; }
    },
    async downloadBackup() {
        try {
            const r = await fetch('/admin/api/db/backup', {headers:{'Authorization':'Bearer '+localStorage.getItem('admin_token')}});
            if(!r.ok) { this.dbMsg='下载失败: '+r.status; this.dbMsgType='error'; return; }
            const blob = await r.blob();
            const cd = r.headers.get('content-disposition');
            let fname = 'alive_broadcast_backup.db';
            if(cd) { const m = cd.match(/filename="?([^"]+)"?/); if(m) fname=m[1]; }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download=fname; a.click();
            URL.revokeObjectURL(url);
            this.dbMsg='下载成功'; this.dbMsgType='success';
        } catch(e) { this.dbMsg='下载失败: '+e.message; this.dbMsgType='error'; }
    },
    async exportJSON() {
        try {
            const r = await fetch('/admin/api/db/export-json', {headers:{'Authorization':'Bearer '+localStorage.getItem('admin_token')}});
            if(!r.ok) { this.dbMsg='导出失败: '+r.status; this.dbMsgType='error'; return; }
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download='alive_broadcast_export.json'; a.click();
            URL.revokeObjectURL(url);
            this.dbMsg='导出成功'; this.dbMsgType='success';
        } catch(e) { this.dbMsg='导出失败: '+e.message; this.dbMsgType='error'; }
    },
    async uploadRestore(event) {
        const file = event.target.files[0]; if(!file) return;
        if(!confirm('确认恢复数据库？当前数据将被替换（恢复前会自动备份）')) return;
        const formData = new FormData(); formData.append('file', file);
        try {
            const r = await fetch('/admin/api/db/upload-restore', {method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('admin_token')}, body:formData});
            const j = await r.json();
            if(j.code===0) { this.dbMsg='恢复成功！'+j.message; this.dbMsgType='success'; }
            else { this.dbMsg=j.message||'恢复失败'; this.dbMsgType='error'; }
        } catch(e) { this.dbMsg='上传失败: '+e.message; this.dbMsgType='error'; }
    },
    async changePwd() { if(!this.oldPwd||!this.newPwd) { this.pwdMsg='请填写完整'; return; } const r = await adminFetch('/admin/api/settings/password', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:this.oldPwd,new_password:this.newPwd})}); const j = await r.json(); this.pwdMsg = j.message || '修改成功'; }
}; }
</script>
{% endblock %}
