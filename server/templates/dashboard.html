{% extends "base.html" %}
{% block content %}
<div x-data="dashboardApp()" x-init="loadData(); loadCachedTabAnalysisAuto()" class="space-y-6">
    <div class="flex items-center justify-between flex-wrap gap-3">
        <h1 class="page-title">数据看板</h1>
        <div class="flex items-center gap-4">
            <!-- 日期导航 -->
            <div class="flex items-center gap-2 bg-white border rounded-lg px-3 py-1.5 shadow-sm">
                <button @click="prevPeriod()" class="text-gray-400 hover:text-blue-600 transition-colors p-0.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <template x-if="range==='day'">
                    <input type="date" x-model="selectedDate" @change="loadData()" class="text-sm font-medium text-gray-700 border-0 p-0 focus:ring-0 w-32 text-center cursor-pointer">
                </template>
                <template x-if="range!=='day'">
                    <span class="text-sm font-medium text-gray-700 min-w-[120px] text-center" x-text="periodLabel"></span>
                </template>
                <button @click="nextPeriod()" class="text-gray-400 hover:text-blue-600 transition-colors p-0.5" :class="isToday() ? 'opacity-30 cursor-not-allowed' : ''">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
            <!-- 粒度切换 -->
            <div class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                <button @click="switchRange('day')" :class="range==='day'?'bg-white shadow text-blue-600':'text-gray-500 hover:text-gray-700'" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">日</button>
                <button @click="switchRange('week')" :class="range==='week'?'bg-white shadow text-blue-600':'text-gray-500 hover:text-gray-700'" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">周</button>
                <button @click="switchRange('month')" :class="range==='month'?'bg-white shadow text-blue-600':'text-gray-500 hover:text-gray-700'" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">月</button>
            </div>
        </div>
    </div>
    <div x-show="alerts.length > 0" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg">
        <template x-for="alert in alerts">
            <p x-text="alert.message" class="text-yellow-700 text-sm"></p>
        </template>
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <template x-for="(kpi, idx) in kpiCards">
            <div class="kpi-card flex items-center justify-between" :style="'border-left-color:' + kpi.borderColor">
                <div class="flex-1 min-w-0">
                    <p class="text-sm text-gray-500 font-medium" x-text="kpi.label"></p>
                    <p class="text-3xl font-bold mt-1" x-text="kpi.value"></p>
                    <p :class="kpi.changeColor" x-text="kpi.change" class="text-sm mt-1"></p>
                </div>
                <div x-show="kpi.extra" class="text-right flex-shrink-0 ml-3">
                    <p class="text-xs text-gray-400" x-text="kpi.extra.label"></p>
                    <p class="text-lg font-semibold text-gray-500" x-text="kpi.extra.value"></p>
                </div>
            </div>
        </template>
    </div>

    <!-- 场选择器 -->
    <div x-show="range === 'day'" class="bg-white rounded-lg shadow-sm p-4">
        <div class="flex items-center gap-3">
            <button @click="prevSession()" :disabled="!canPrevSession" class="px-2 py-1 rounded text-sm hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed">&#9664;</button>
            <select x-model="selectedSessionId" @change="onSessionChange()" class="border rounded-lg px-3 py-1.5 text-sm">
                <option value="">全部场次</option>
                <template x-for="s in sessionList" :key="s.id">
                    <option :value="s.id" x-text="s.start_time?.slice(0,16)+' ~ '+s.end_time?.slice(0,16)+' ('+s.leads+'线索)'"></option>
                </template>
            </select>
            <button @click="nextSession()" :disabled="!canNextSession" class="px-2 py-1 rounded text-sm hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed">&#9654;</button>
            <span x-show="selectedSessionId" class="text-xs text-gray-400">场均模式</span>
        </div>
    </div>

    <!-- 多Tab报表区域 -->
    <div class="bg-white rounded-lg shadow-sm">
        <!-- Tab行 -->
        <div class="flex border-b px-4 pt-3 gap-1 overflow-x-auto">
            <template x-for="tab in dashboardTabs" :key="tab.id">
                <button @click="switchTab(tab.id)"
                    :class="activeTabId === tab.id ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                    class="px-4 py-2 text-sm font-medium border-b-2 transition-colors whitespace-nowrap"
                    x-text="tab.name">
                </button>
            </template>
        </div>

        <!-- 数据分析区 -->
        <div class="p-5 border-b">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold text-gray-600">数据分析</h3>
                <button @click="triggerAnalysis()" :disabled="analyzing"
                    class="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-100 disabled:opacity-50">
                    <span x-text="analyzing ? '分析中...' : 'AI分析'"></span>
                </button>
            </div>
            <div x-show="analysisContent" class="text-sm text-gray-700 leading-relaxed prose prose-sm max-w-none" x-html="renderMarkdown(analysisContent)"></div>
            <div x-show="!analysisContent && !analyzing" class="text-center text-gray-400 py-4 text-sm">点击"AI分析"获取数据分析</div>
            <div x-show="analyzing" class="text-center text-gray-400 py-4 text-sm">
                <svg class="animate-spin inline w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                AI正在分析...
            </div>
        </div>

        <!-- 图表区 -->
        <div class="p-5">
            <div :id="'tabChart_' + activeTabId" style="height:320px;"></div>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow-sm overflow-x-auto">
        <table class="data-table">
            <thead><tr><th>日期</th><th>时段</th><th>时长</th><th>线索</th><th>消耗</th></tr></thead>
            <tbody>
                <template x-for="s in recentSessions">
                    <tr @click="location.href='/session/'+s.id" class="cursor-pointer">
                        <td x-text="s.date"></td>
                        <td x-text="s.time_range"></td>
                        <td x-text="s.duration_text"></td>
                        <td x-text="s.leads"></td>
                        <td x-text="'¥'+s.spend"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function dashboardApp() {
    function yesterday() {
        const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10);
    }
    return {
        range: 'day',
        selectedDate: yesterday(),
        periodLabel: '',
        kpiCards: [], alerts: [], recentSessions: [],
        // 新增：多Tab报表
        dashboardTabs: [],
        activeTabId: null,
        analysisContent: '',
        analyzing: false,
        // 新增：场选择器
        sessionList: [],
        selectedSessionId: '',
        // 图表实例缓存
        _chartInstances: {},

        switchRange(r) {
            this.range = r;
            this.selectedDate = yesterday();
            this.loadData();
        },
        prevPeriod() {
            const d = new Date(this.selectedDate);
            if (this.range === 'day') d.setDate(d.getDate() - 1);
            else if (this.range === 'week') d.setDate(d.getDate() - 7);
            else d.setMonth(d.getMonth() - 1);
            this.selectedDate = d.toISOString().slice(0, 10);
            this.loadData();
        },
        nextPeriod() {
            if (this.isToday()) return;
            const d = new Date(this.selectedDate);
            if (this.range === 'day') d.setDate(d.getDate() + 1);
            else if (this.range === 'week') d.setDate(d.getDate() + 7);
            else d.setMonth(d.getMonth() + 1);
            const today = new Date().toISOString().slice(0, 10);
            if (d.toISOString().slice(0, 10) > today) this.selectedDate = today;
            else this.selectedDate = d.toISOString().slice(0, 10);
            this.loadData();
        },
        isToday() {
            return this.selectedDate >= new Date().toISOString().slice(0, 10);
        },

        async loadData() {
            const params = new URLSearchParams({ range: this.range, date: this.selectedDate });
            if (this.selectedSessionId && this.range === 'day') params.set('session_id', this.selectedSessionId);
            const resp = await fetch(`/api/dashboard?${params}`);
            const json = await resp.json();
            const d = json.data || {};
            this.alerts = d.alerts || [];
            this.periodLabel = d.period?.label || '';
            if (this.range === 'day') this.selectedDate = d.period?.start || this.selectedDate;
            const hist = d.historical_avg || {};
            const leads = d.current?.leads || 0;
            const spend = d.current?.spend || 0;
            const leadCost = d.current?.lead_cost || 0;
            const isPerSession = !!this.selectedSessionId && this.range === 'day';
            const rangeMap = {
                day:   {label: isPerSession ? '场均' : '历史日均', leads:'avg_leads_per_day',  spend:'avg_spend_per_day'},
                week:  {label:'历史周均', leads:'avg_leads_per_week',  spend:'avg_spend_per_week'},
                month: {label:'历史月均', leads:'avg_leads_per_month', spend:'avg_spend_per_month'}
            };
            const rm = rangeMap[this.range] || rangeMap.day;
            this.kpiCards = [
                {label: isPerSession ? '1场' : '总场次', value: isPerSession ? 1 : (d.current?.sessions||0), change: d.change?.sessions||'0%', changeColor:'text-gray-500', borderColor:'#3b82f6'},
                {label: isPerSession ? '线索' : '总线索', value:leads, change:d.change?.leads||'0%', changeColor:'text-green-500', borderColor:'#10b981', extra:{label: rm.label+'线索', value:(hist[rm.leads]||0).toFixed(1)}},
                {label: isPerSession ? '消耗' : '总消耗', value:'¥'+(spend||0).toFixed(2), change:d.change?.spend||'0%', changeColor:'text-orange-500', borderColor:'#f59e0b', extra:{label: rm.label+'消耗', value:'¥'+(hist[rm.spend]||0).toFixed(0)}},
                {label:'线索平均成本', value:'¥'+(leadCost||0).toFixed(2), change:d.change?.lead_cost||'0%', changeColor:'text-blue-500', borderColor:'#8b5cf6', extra:{label:'历史线索成本', value:'¥'+(hist.avg_lead_cost||0).toFixed(1)}},
            ];
            this.recentSessions = (d.recent_sessions||[]).map(s => ({...s, date: s.start_time?.slice(0,10), time_range: s.start_time?.slice(0,16)+' ~ '+s.end_time?.slice(0,16), duration_text: s.duration_text || '—'}));

            // 加载Tab配置和场选择器
            await this.loadTabs();
            await this.loadSessionList();
            // 切换日期时重新加载缓存分析
            await this.loadCachedTabAnalysis();
        },

        async loadTabs() {
            const resp = await fetch('/api/dashboard-tabs');
            const json = await resp.json();
            this.dashboardTabs = json.data || [];
            if (this.dashboardTabs.length > 0 && !this.activeTabId) {
                this.activeTabId = this.dashboardTabs[0].id;
            }
            if (this.activeTabId) {
                await this.loadTabData();
            }
        },

        async loadSessionList() {
            try {
                const resp = await fetch(`/api/sessions/by-room?date=${this.selectedDate}`);
                const json = await resp.json();
                this.sessionList = json.data || [];
            } catch { this.sessionList = []; }
        },

        async switchTab(tabId) {
            this.activeTabId = tabId;
            this.analysisContent = '';
            await this.loadTabData();
            await this.loadCachedTabAnalysis();
        },

        async onSessionChange() {
            await this.loadData();
        },

        // 加载缓存分析（有选中场次→场次级；无选中→Tab级别），不触发AI
        async loadCachedTabAnalysis() {
            if (!this.activeTabId) return;
            if (this.selectedSessionId) {
                try {
                    const r = await fetch(`/api/reports/session/${this.selectedSessionId}`);
                    const j = await r.json();
                    if (j.code === 0 && j.content) { this.analysisContent = j.content; return; }
                } catch {}
            }
            const params = new URLSearchParams({ range: this.range, date: this.selectedDate });
            try {
                const r = await fetch(`/api/dashboard-tabs/${this.activeTabId}/analysis?${params}`);
                const j = await r.json();
                if (j.code === 0 && j.data?.content) this.analysisContent = j.data.content;
            } catch {}
        },

        // 页面初始化时自动加载缓存分析（等loadTabs设置activeTabId后）
        async loadCachedTabAnalysisAuto() {
            await new Promise(r => setTimeout(r, 100));
            await this.loadCachedTabAnalysis();
        },

        get currentSessionIndex() {
            if (!this.selectedSessionId || !this.sessionList.length) return -1;
            return this.sessionList.findIndex(s => String(s.id) === String(this.selectedSessionId));
        },
        get canPrevSession() { return this.sessionList.length > 0 && this.currentSessionIndex > 0; },
        get canNextSession() { return this.sessionList.length > 0 && this.currentSessionIndex < this.sessionList.length - 1 && this.currentSessionIndex >= 0; },
        prevSession() {
            if (!this.canPrevSession) return;
            this.selectedSessionId = String(this.sessionList[this.currentSessionIndex - 1].id);
            this.onSessionChange();
        },
        nextSession() {
            if (!this.canNextSession) return;
            this.selectedSessionId = String(this.sessionList[this.currentSessionIndex + 1].id);
            this.onSessionChange();
        },

        async loadTabData() {
            if (!this.activeTabId) return;
            const params = new URLSearchParams({ range: this.range, date: this.selectedDate });
            if (this.selectedSessionId) params.set('session_id', this.selectedSessionId);
            try {
                const resp = await fetch(`/api/dashboard-tabs/${this.activeTabId}/data?${params}`);
                const json = await resp.json();
                this.renderTabChart(json.data || {});
            } catch (e) { console.error('加载Tab数据失败:', e); }
        },

        renderTabChart(data) {
            const chartId = 'tabChart_' + this.activeTabId;
            const el = document.getElementById(chartId);
            if (!el) return;

            // 销毁旧图表
            if (this._chartInstances[chartId]) {
                this._chartInstances[chartId].dispose();
            }

            const chart = echarts.init(el);
            this._chartInstances[chartId] = chart;

            const labels = data.labels || [];
            const seriesData = data.series || [];
            const tab = this.dashboardTabs.find(t => t.id === this.activeTabId);
            const chartType = tab?.chart_type || 'line';

            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4'];
            const series = seriesData.map((s, i) => ({
                name: s.name,
                type: chartType,
                data: s.data,
                smooth: true,
                itemStyle: { color: colors[i % colors.length] },
            }));

            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: seriesData.map(s => s.name) },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: labels, boundaryGap: chartType === 'bar' },
                yAxis: seriesData.length > 1 ? undefined : { type: 'value' },
                series: series,
            });

            window.addEventListener('resize', () => chart.resize());
        },

        async triggerAnalysis() {
            if (!this.activeTabId || this.analyzing) return;
            this.analyzing = true;
            this.analysisContent = '';
            try {
                const resp = await fetch(`/api/dashboard-tabs/${this.activeTabId}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        range: this.range,
                        date: this.selectedDate,
                        session_id: this.selectedSessionId ? parseInt(this.selectedSessionId) : null
                    })
                });
                const ct = resp.headers.get('content-type') || '';
                if (ct.includes('text/event-stream')) {
                    // 流式输出
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const d = JSON.parse(line.slice(6));
                                    if (d.done) break;
                                    if (d.text) this.analysisContent += d.text;
                                } catch {}
                            }
                        }
                    }
                } else {
                    // 非流式（缓存命中或错误）
                    const json = await resp.json();
                    if (json.code === 0) {
                        this.analysisContent = json.data.content || '';
                    } else {
                        this.analysisContent = '分析失败: ' + (json.message || '未知错误');
                    }
                }
            } catch (e) {
                this.analysisContent = '请求失败: ' + e.message;
            } finally {
                this.analyzing = false;
            }
        },

        renderMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/### (.+)/g, '<h4 class="font-bold mt-3 mb-1">$1</h4>')
                .replace(/## (.+)/g, '<h3 class="font-bold mt-4 mb-2 text-base">$1</h3>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/- (.+)/g, '<li class="ml-4">$1</li>')
                .replace(/\n/g, '<br>');
        }
    };
}
</script>
{% endblock %}
