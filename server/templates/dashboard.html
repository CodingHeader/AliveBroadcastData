{% extends "base.html" %}
{% block content %}
<div x-data="dashboardApp()" x-init="loadData()" class="space-y-6">
    <div class="flex items-center justify-between flex-wrap gap-3">
        <h1 class="page-title">数据看板</h1>
        <div class="flex items-center gap-4">
            <!-- 日期导航 -->
            <div class="flex items-center gap-2 bg-white border rounded-lg px-3 py-1.5 shadow-sm">
                <button @click="prevPeriod()" class="text-gray-400 hover:text-blue-600 transition-colors p-0.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <template x-if="range==='day'">
                    <input type="date" x-model="selectedDate" @change="loadData()" class="text-sm font-medium text-gray-700 border-0 p-0 focus:ring-0 w-32 text-center cursor-pointer">
                </template>
                <template x-if="range!=='day'">
                    <span class="text-sm font-medium text-gray-700 min-w-[120px] text-center" x-text="periodLabel"></span>
                </template>
                <button @click="nextPeriod()" class="text-gray-400 hover:text-blue-600 transition-colors p-0.5" :class="isToday() ? 'opacity-30 cursor-not-allowed' : ''">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
            <!-- 粒度切换 -->
            <div class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                <button @click="switchRange('day')" :class="range==='day'?'bg-white shadow text-blue-600':'text-gray-500 hover:text-gray-700'" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">日</button>
                <button @click="switchRange('week')" :class="range==='week'?'bg-white shadow text-blue-600':'text-gray-500 hover:text-gray-700'" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">周</button>
                <button @click="switchRange('month')" :class="range==='month'?'bg-white shadow text-blue-600':'text-gray-500 hover:text-gray-700'" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">月</button>
            </div>
        </div>
    </div>
    <div x-show="alerts.length > 0" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg">
        <template x-for="alert in alerts">
            <p x-text="alert.message" class="text-yellow-700 text-sm"></p>
        </template>
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <template x-for="(kpi, idx) in kpiCards">
            <div class="kpi-card flex items-center justify-between" :style="'border-left-color:' + kpi.borderColor">
                <div class="flex-1 min-w-0">
                    <p class="text-sm text-gray-500 font-medium" x-text="kpi.label"></p>
                    <p class="text-3xl font-bold mt-1" x-text="kpi.value"></p>
                    <p :class="kpi.changeColor" x-text="kpi.change" class="text-sm mt-1"></p>
                </div>
                <div x-show="kpi.extra" class="text-right flex-shrink-0 ml-3">
                    <p class="text-xs text-gray-400" x-text="kpi.extra.label"></p>
                    <p class="text-lg font-semibold text-gray-500" x-text="kpi.extra.value"></p>
                </div>
            </div>
        </template>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-5">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-semibold text-gray-600">主播表现 Top3</h3>
            <span class="text-xs text-gray-400">注：一场多主播的数据有重叠</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" x-show="topAnchors.length>0">
            <template x-for="(a, idx) in topAnchors">
                <div class="border rounded-lg p-4" :class="idx===0?'border-yellow-400 bg-yellow-50':(idx===1?'border-gray-300 bg-gray-50':'border-orange-300 bg-orange-50')">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold" x-text="a.anchor_name"></span>
                        <span class="text-xs px-2 py-0.5 rounded" :class="idx===0?'bg-yellow-200':(idx===1?'bg-gray-200':'bg-orange-200')" x-text="idx===0?'🥇 冠军':(idx===1?'🥈 亚军':'🥉 季军')"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div><span class="text-gray-500">场次</span> <span class="font-semibold" x-text="a.session_count"></span></div>
                        <div><span class="text-gray-500">线索</span> <span class="font-semibold" x-text="a.total_leads"></span></div>
                        <div><span class="text-gray-500">成单率</span> <span class="font-semibold text-green-600" x-text="a.deal_rate+'%'"></span></div>
                        <div><span class="text-gray-500">成单金额</span> <span class="font-semibold" x-text="'¥'+a.deal_amount"></span></div>
                    </div>
                </div>
            </template>
        </div>
        <div x-show="topAnchors.length===0" class="text-center text-gray-400 py-4 text-sm">暂无主播数据</div>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-5">
        <h3 class="text-sm font-semibold text-gray-600 mb-3">线索趋势</h3>
        <div id="trendChart" style="height:320px;"></div>
    </div>
    <div class="bg-white rounded-lg shadow-sm overflow-x-auto">
        <table class="data-table">
            <thead><tr><th>日期</th><th>时段</th><th>时长</th><th>线索</th><th>消耗</th></tr></thead>
            <tbody>
                <template x-for="s in recentSessions">
                    <tr @click="location.href='/session/'+s.id" class="cursor-pointer">
                        <td x-text="s.date"></td>
                        <td x-text="s.time_range"></td>
                        <td x-text="s.duration_text"></td>
                        <td x-text="s.leads"></td>
                        <td x-text="'¥'+s.spend"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function dashboardApp() {
    return {
        range: 'day',
        selectedDate: new Date().toISOString().slice(0, 10),
        periodLabel: '',
        kpiCards: [], alerts: [], recentSessions: [], topAnchors: [],

        switchRange(r) {
            this.range = r;
            this.selectedDate = new Date().toISOString().slice(0, 10);
            this.loadData();
        },
        prevPeriod() {
            const d = new Date(this.selectedDate);
            if (this.range === 'day') d.setDate(d.getDate() - 1);
            else if (this.range === 'week') d.setDate(d.getDate() - 7);
            else d.setMonth(d.getMonth() - 1);
            this.selectedDate = d.toISOString().slice(0, 10);
            this.loadData();
        },
        nextPeriod() {
            if (this.isToday()) return;
            const d = new Date(this.selectedDate);
            if (this.range === 'day') d.setDate(d.getDate() + 1);
            else if (this.range === 'week') d.setDate(d.getDate() + 7);
            else d.setMonth(d.getMonth() + 1);
            const today = new Date().toISOString().slice(0, 10);
            if (d.toISOString().slice(0, 10) > today) this.selectedDate = today;
            else this.selectedDate = d.toISOString().slice(0, 10);
            this.loadData();
        },
        isToday() {
            return this.selectedDate >= new Date().toISOString().slice(0, 10);
        },

        async loadData() {
            const resp = await fetch(`/api/dashboard?range=${this.range}&date=${this.selectedDate}`);
            const json = await resp.json();
            const d = json.data || {};
            this.alerts = d.alerts || [];
            this.periodLabel = d.period?.label || '';
            if (this.range === 'day') this.selectedDate = d.period?.start || this.selectedDate;
            const hist = d.historical_avg || {};
            const leads = d.current?.leads || 0;
            const spend = d.current?.spend || 0;
            const leadCost = d.current?.lead_cost || 0;
            const rangeMap = {
                day:   {label:'历史日均', leads:'avg_leads_per_day',  spend:'avg_spend_per_day'},
                week:  {label:'历史周均', leads:'avg_leads_per_week',  spend:'avg_spend_per_week'},
                month: {label:'历史月均', leads:'avg_leads_per_month', spend:'avg_spend_per_month'}
            };
            const rm = rangeMap[this.range] || rangeMap.day;
            this.kpiCards = [
                {label:'总场次', value:d.current?.sessions||0, change:d.change?.sessions||'0%', changeColor:'text-gray-500', borderColor:'#3b82f6'},
                {label:'总线索', value:leads, change:d.change?.leads||'0%', changeColor:'text-green-500', borderColor:'#10b981', extra:{label: rm.label+'线索', value:(hist[rm.leads]||0).toFixed(1)}},
                {label:'总消耗', value:'¥'+(spend||0), change:d.change?.spend||'0%', changeColor:'text-orange-500', borderColor:'#f59e0b', extra:{label: rm.label+'消耗', value:'¥'+(hist[rm.spend]||0).toFixed(0)}},
                {label:'线索平均成本', value:'¥'+(leadCost||0), change:d.change?.lead_cost||'0%', changeColor:'text-blue-500', borderColor:'#8b5cf6', extra:{label:'历史线索成本', value:'¥'+(hist.avg_lead_cost||0).toFixed(1)}},
            ];
            this.recentSessions = (d.recent_sessions||[]).map(s => ({...s, date: s.start_time?.slice(0,10), time_range: s.start_time?.slice(11,16)+'~'+s.end_time?.slice(11,16), duration_text: s.duration_text || '—'}));
            this.renderTrendChart(d.trend || []);
            // 加载主播Top3
            const anchorResp = await fetch('/api/anchors/stats');
            const anchorJson = await anchorResp.json();
            this.topAnchors = (anchorJson.data || []).sort((a,b) => b.deal_rate - a.deal_rate).slice(0,3);
        },
        renderTrendChart(data) {
            const chart = echarts.init(document.getElementById('trendChart'));
            chart.setOption({
                xAxis: { type: 'category', data: data.map(d => d.date) },
                yAxis: [{ type: 'value', name: '线索' }, { type: 'value', name: '消耗' }],
                series: [
                    { name: '线索', type: 'line', data: data.map(d => d.leads) },
                    { name: '消耗', type: 'line', yAxisIndex: 1, data: data.map(d => d.spend) },
                ],
                tooltip: { trigger: 'axis' }, legend: {}
            });
        }
    };
}
</script>
{% endblock %}
